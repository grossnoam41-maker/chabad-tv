<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול מסך בית חב"ד</title>
    <style>
        :root {
            --primary-color: #0d233a;
            --accent-color: #d4af37;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px;
            direction: rtl;
        }
        .container { max-width: 500px; margin: 0 auto; }
        header {
            text-align: center; padding: 15px 0;
            background-color: var(--primary-color);
            color: white; border-radius: 12px;
            margin-bottom: 20px;
        }
        header h1 { margin: 0; font-size: 20px; }
        header p { margin: 5px 0 0 0; font-size: 13px; color: var(--accent-color); }
        .card {
            background: var(--card-bg); border-radius: 12px;
            padding: 20px; margin-bottom: 15px;
            border-right: 5px solid var(--accent-color);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: var(--primary-color); }
        textarea {
            width: 100%; padding: 10px; border: 1px solid #cccccc;
            border-radius: 8px; font-size: 15px; box-sizing: border-box;
            font-family: inherit; resize: vertical;
        }
        .btn-submit {
            background-color: var(--primary-color); color: white;
            border: none; padding: 15px; width: 100%;
            border-radius: 8px; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #status-message {
            display: none; padding: 12px; border-radius: 8px;
            text-align: center; font-weight: bold; margin-bottom: 15px;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>ניהול מסך בית חב"ד</h1>
        <p>עדכון מהיר לטלוויזיה בזמן אמת</p>
    </header>
    <div id="status-message"></div>
    <form id="update-form">
        <div class="card">
            <label for="bulletin">הודעה ראשית ללוח המודעות:</label>
            <textarea id="bulletin" rows="4"></textarea>
        </div>
        <div class="card">
            <label for="hours">זמני בית הכנסת ותפילות:</label>
            <textarea id="hours" rows="3"></textarea>
        </div>
        <div class="card">
            <label for="kiddush">פרטי הקידוש לשבת הקרובה:</label>
            <textarea id="kiddush" rows="3"></textarea>
        </div>
        <div class="card">
            <label for="contact">פרטי יצירת קשר וכתובת:</label>
            <textarea id="contact" rows="2"></textarea>
        </div>
        <button type="submit" class="btn-submit">⚡ עדכן את הטלוויזיה עכשיו</button>
    </form>
</div>
<script>
    // כאן נחליף את הכתובת בהמשך לכתובת השרת האמיתית שלך מ-Render
    let SERVER_URL = "https://TEMP-URL.onrender.com"; 
    const SECRET_ENDPOINT = "/update-chabad-panel-98725";

    const statusDiv = document.getElementById('status-message');

    async function loadCurrentData() {
        showStatus("טוען נתונים...", "success");
        try {
            const response = await fetch(`${SERVER_URL}/get-data`);
            if (response.ok) {
                const data = await response.json();
                document.getElementById('bulletin').value = data.bulletin_message || "";
                document.getElementById('hours').value = data.shul_hours || "";
                document.getElementById('kiddush').value = data.kiddush_info || "";
                document.getElementById('contact').value = data.contact_info || "";
                statusDiv.style.display = "none";
            }
        } catch (error) {
            showStatus("עדיין אין חיבור לשרת...", "error");
        }
    }

    function showStatus(text, type) {
        statusDiv.innerText = text; statusDiv.className = type; statusDiv.style.display = "block";
        if (type === "success") { setTimeout(() => { statusDiv.style.display = "none"; }, 3000); }
    }

    document.getElementById('update-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        showStatus("שולח עדכון...", "success");
        const payload = {
            bulletin_message: document.getElementById('bulletin').value,
            shul_hours: document.getElementById('hours').value,
            kiddush_info: document.getElementById('kiddush').value,
            contact_info: document.getElementById('contact').value
        };
        try {
            const response = await fetch(`${SERVER_URL}${SECRET_ENDPOINT}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (response.ok) { showStatus("🎉 המסך עודכן בהצלחה!", "success"); }
            else { showStatus("שגיאה בעדכון", "error"); }
        } catch (error) { showStatus("שגיאת תקשורת", "error"); }
    });

    setTimeout(loadCurrentData, 1000);
</script>
</body>
</html>
