<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מסך בית חב"ד</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050b14;
            color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            height: 100vh; overflow: hidden;
            display: grid;
            grid-template-columns: 32% 68%;
            direction: rtol;
        }
        .right-pane {
            background-color: #0d233a;
            border-left: 4px solid #d4af37;
            padding: 25px;
            display: flex; flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }
        .left-pane {
            padding: 40px;
            display: flex; flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            position: relative;
        }
        .clock {
            font-size: 55px; font-weight: bold;
            color: #ffffff; text-align: center;
            margin-bottom: 5px;
            font-family: monospace;
        }
        .hebrew-date {
            font-size: 20px; color: #d4af37;
            text-align: center; margin-bottom: 25px;
            font-weight: bold;
        }
        .times-box {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px; padding: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .time-row {
            display: flex; justify-content: space-between;
            margin-bottom: 12px; font-size: 17px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            direction: rtl;
        }
        .time-row:last-child { border-bottom: none; }
        .time-label { color: #cbd5e1; }
        .time-value { color: #ffffff; font-weight: bold; }
        
        .slide {
            opacity: 0; transition: opacity 1s ease-in-out;
            position: absolute; width: calc(100% - 80px);
            display: none;
        }
        .slide.active {
            opacity: 1; display: block;
        }
        .slide h2 {
            font-size: 40px; color: #d4af37;
            margin-top: 0; margin-bottom: 20px;
            border-bottom: 3px solid #d4af37;
            padding-bottom: 10px;
        }
        .slide-content {
            font-size: 28px; line-height: 1.5;
            white-space: pre-line; color: #f8fafc;
        }
    </style>
</head>
<body>

    <div class="right-pane">
        <div>
            <div class="clock" id="live-clock">00:00:00</div>
            <div class="hebrew-date" id="hebrew-date">טוען תאריך עברי...</div>
            
            <div class="times-box">
                <div class="time-row">
                    <span class="time-label">פרשת השבוע:</span>
                    <span class="time-value" id="parasha">טוען...</span>
                </div>
                <div class="time-row">
                    <span class="time-label">כניסת שבת:</span>
                    <span class="time-value" id="candle-lighting">טוען...</span>
                </div>
                <div class="time-row">
                    <span class="time-label">יציאת שבת:</span>
                    <span class="time-value" id="havdalah">טוען...</span>
                </div>
            </div>
        </div>
        <div style="text-align: center; color: #a1a1aa; font-size: 13px;">
            בית חב"ד המקומי • 24/7
        </div>
    </div>

    <div class="left-pane">
        <div class="slide active" id="slide-bulletin">
            <h2>לוח מודעות</h2>
            <div class="slide-content" id="tv-bulletin">טוען מודעות...</div>
        </div>
        <div class="slide" id="slide-hours">
            <h2>זמני תפילות ושיעורים</h2>
            <div class="slide-content" id="tv-hours">טוען זמנים...</div>
        </div>
        <div class="slide" id="slide-kiddush">
            <h2>קידוש השבוע</h2>
            <div class="slide-content" id="tv-kiddush">טוען מידע...</div>
        </div>
        <div class="slide" id="slide-contact">
            <h2>יצירת קשר</h2>
            <div class="slide-content" id="tv-contact">טוען פרטים...</div>
        </div>
    </div>

    <script>
        // כאן נחליף את הכתובת בהמשך לכתובת השרת האמיתית שלך מ-Render
        let BACKEND_URL = "https://TEMP-URL.onrender.com";

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchHebrewCalendar() {
            try {
                // משיכת זמנים לפי אשקלון (geonameid=295721)
                const response = await fetch("https://www.hebcal.com/shabbat?cfg=json&geonameid=295721&m=50");
                const data = await response.json();
                
                document.getElementById('hebrew-date').innerText = data.hebrew;
                
                const parashaItem = data.items.find(i => i.category === "parashat");
                const candleItem = data.items.find(i => i.category === "candles");
                const havdalahItem = data.items.find(i => i.category === "havdalah");

                if (parashaItem) document.getElementById('parasha').innerText = parashaItem.title;
                if (candleItem) document.getElementById('candle-lighting').innerText = candleItem.title.split(": ")[1];
                if (havdalahItem) document.getElementById('havdalah').innerText = havdalahItem.title.split(": ")[1];
            } catch (e) {
                console.error("Error fetching calendar", e);
            }
        }
        fetchHebrewCalendar();
        setInterval(fetchHebrewCalendar, 3600000);

        async function fetchDynamicData() {
            try {
                const response = await fetch(`${BACKEND_URL}/get-data`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('tv-bulletin').innerText = data.bulletin_message;
                    document.getElementById('tv-hours').innerText = data.shul_hours;
                    document.getElementById('tv-kiddush').innerText = data.kiddush_info;
                    document.getElementById('tv-contact').innerText = data.contact_info;
                }
            } catch (e) {
                console.error("Error fetching backend data", e);
            }
        }
        
        // נפעיל את משיכת הנתונים רק אחרי שנעדכן את הכתובת
        setTimeout(fetchDynamicData, 1000);
        setInterval(fetchDynamicData, 300000); // רענון כל 5 דקות

        const slides = document.querySelectorAll('.slide');
        let currentSlideIndex = 0;

        function showNextSlide() {
            slides[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + 1) % slides.length;
            slides[currentSlideIndex].classList.add('active');
        }
        setInterval(showNextSlide, 15000); // שקופית מתחלפת כל 15 שניות

        // רענון זיכרון קשיח ב-4 לפנות בוקר
        setInterval(() => {
            const now = new Date();
            if (now.getHours() === 4 && now.getMinutes() === 0) {
                location.reload();
            }
        }, 60000);
    </script>
</body>
</html>
