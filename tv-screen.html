<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מסך בית חב"ד</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* הגדרות כלליות למסך טלוויזיה */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Assistant', 'Rubik', sans-serif;
            background-color: #0b0f19; /* רקע כחול כהה עמוק */
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 2vw;
        }

        /* כותרת עליונה - לוגו, שעון ותאריך */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #eab308; /* פס זהב */
            padding-bottom: 1.5vh;
            margin-bottom: 3vh;
        }
        .logo-area h1 {
            font-family: 'Rubik', sans-serif;
            font-weight: 900;
            font-size: 3.2rem;
            color: #eab308; /* זהב חב"ד */
            text-shadow: 0 0 10px rgba(234, 179, 8, 0.3);
            letter-spacing: 1px;
        }
        .logo-area p {
            font-size: 1.3rem;
            color: #94a3b8;
            font-weight: 400;
            margin-top: -5px;
        }
        .time-area {
            text-align: left;
        }
        #clock {
            font-family: 'Rubik', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }
        #date {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-top: 5px;
            font-weight: 600;
        }

        /* גריד התוכן המרכזי */
        main {
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* חלוקה של זמני תפילה (רחב יותר) מול קידוש וקשר */
            gap: 2.5vw;
            flex-grow: 1;
            margin-bottom: 3vh;
        }

        /* עיצוב כרטיסי המידע */
        .card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 3vh 2.5vw;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        /* פס דקורטיבי בצד ימין של כל כרטיס */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 6px;
            background-color: #3b82f6; /* כחול בהיר כברירת מחדל */
        }
        .card.shul-hours::before {
            background-color: #eab308; /* כרטיס זמני תפילה מקבל פס זהב */
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 2vh;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1vh;
        }
        
        /* תוכן הכרטיסים */
        .card-content {
            font-size: 1.6rem;
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-wrap; /* שומר על ירידות השורה (אנטרים) מהטבלה! */
            font-weight: 400;
            flex-grow: 1;
        }

        /* התאמות ספציפיות לכרטיסים */
        .shul-hours .card-content {
            font-size: 1.8rem;
            font-weight: 600;
            color: #f8fafc;
        }
        .contact-info .card-content {
            font-size: 1.5rem;
            color: #94a3b8;
        }

        /* עמודת הימין המפוצלת (קידוש למעלה, קשר למטה) */
        .side-column {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 2.5vw;
        }

        /* באנר תחתון - הודעה רצה/מרכזית */
        footer {
            background: linear-gradient(90deg, #1e3a8a 0%, #1e40af 100%); /* רקע כחול רויאל מלכותי */
            border-radius: 16px;
            padding: 2.5vh 3vw;
            box-shadow: 0 8px 20px rgba(30, 64, 175, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 12vh;
        }
        #tv-bulletin {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>בית חב"ד</h1>
            <p>שמחים לארח אתכם תמיד!</p>
        </div>
        <div class="time-area">
            <div id="clock">00:00:00</div>
            <div id="date">טוען תאריך...</div>
        </div>
    </header>

    <main>
        <div class="card shul-hours">
            <div class="card-title" style="color: #eab308;">🕒 זמני התפילות בבית הכנסת</div>
            <div class="card-content" id="tv-hours">טוען זמני תפילה...</div>
        </div>

        <div class="side-column">
            <div class="card kiddush-info">
                <div class="card-title" style="color: #38bdf8;">🍷 קידוש השבוע</div>
                <div class="card-content" id="tv-kiddush">טוען פרטי קידוש...</div>
            </div>

            <div class="card contact-info">
                <div class="card-title" style="color: #a78bfa;">📞 ליצירת קשר ושותפות</div>
                <div class="card-content" id="tv-contact">טוען פרטי קשר...</div>
            </div>
        </div>
    </main>

    <footer>
        <div id="tv-bulletin">ברוכים הבאים לבית חב"ד!</div>
    </footer>

    <script>
        // קישור השרת של גוגל שסיפקת
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxbJHezJqwpeNRGAyKnll7p7eh3__dL4_Ysl9sSsV_-tjPgnozP4jfCL4utF6XUHJWY/exec";

        // פונקציה לעדכון השעון והתאריך בזמן אמת
        function updateClockAndDate() {
            const now = new Date();
            
            // עיצוב השעון (HH:MM:SS)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;

            // עיצוב תאריך לועזי בעברית (למשל: יום חמישי, 16 ביולי 2026)
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = now.toLocaleDateString('he-IL', options);
            document.getElementById('date').innerText = formattedDate;
        }

        // פונקציה למשיכת הנתונים מהטבלה של גוגל
        async function fetchDynamicData() {
            try {
                const response = await fetch(BACKEND_URL);
                if (response.ok) {
                    const data = await response.json();
                    
                    // עדכון התוכן במסך (עם תמיכה בברירות מחדל אם משהו חסר)
                    document.getElementById('tv-bulletin').innerText = data.bulletin_message || "ברוכים הבאים לבית חב\"ד!";
                    document.getElementById('tv-hours').innerText = data.shul_hours || "אין זמני תפילה מעודכנים כרגע";
                    document.getElementById('tv-kiddush').innerText = data.kiddush_info || "טרם עודכן קידוש לשבוע זה";
                    document.getElementById('tv-contact').innerText = data.contact_info || "ליצירת קשר פנו לשליח חב\"ד";
                }
            } catch (e) {
                console.error("Error fetching data from Google Sheets:", e);
            }
        }

        // הפעלת השעון (רץ כל שנייה)
        setInterval(updateClockAndDate, 1000);
        updateClockAndDate();

        // הפעלת משיכת הנתונים מגוגל (רצה מיד עם טעינת המסך, ולאחר מכן כל 30 שניות)
        fetchDynamicData();
        setInterval(fetchDynamicData, 30000); // 30000 מילישניות = 30 שניות
    </script>
</body>
</html>
