<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מסך בית חב"ד</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* הגדרות כלליות למסך טלוויזיה */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Assistant', 'Rubik', sans-serif;
            background-color: #0b0f19; /* רקע כחול כהה עמוק */
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 2vw;
        }

        /* כותרת עליונה - לוגו, שעון ותאריך */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #eab308; /* פס זהב */
            padding-bottom: 1.5vh;
            margin-bottom: 3vh;
        }
        .logo-area h1 {
            font-family: 'Rubik', sans-serif;
            font-weight: 900;
            font-size: 3.2rem;
            color: #eab308; /* זהב חב"ד */
            text-shadow: 0 0 10px rgba(234, 179, 8, 0.3);
            letter-spacing: 1px;
        }
        .logo-area p {
            font-size: 1.3rem;
            color: #94a3b8;
            font-weight: 400;
            margin-top: -5px;
        }
        .time-area {
            text-align: left;
        }
        #clock {
            font-family: 'Rubik', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }
        #date {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-top: 5px;
            font-weight: 600;
        }

        /* גריד התוכן המרכזי */
        main {
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* חלוקה של זמני תפילה (רחב יותר) מול קידוש וקשר */
            gap: 2.5vw;
            flex-grow: 1;
            margin-bottom: 3vh;
        }

        /* עיצוב כרטיסי המידע */
        .card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 3vh 2.5vw;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        /* פס דקורטיבי בצד ימין של כל כרטיס */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 6px;
            background-color: #3b82f6; /* כחול בהיר כברירת מחדל */
        }
